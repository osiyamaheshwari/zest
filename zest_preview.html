    // ========================================================
    // 3. MAIN APPLICATION CONTAINER
    // ========================================================
    function App() {

      const [darkMode, setDarkMode] = useState(false);
      const [currentUser, setCurrentUser] = useState(null);
      const [notifications, setNotifications] = useState([

        { id: 2, text: "Someone is interested in your 'Hercules Gear Cycle' listing.", time: "2 hours ago", read: false },
        { id: 3, text: "New PG accommodation listed 1.2 km from campus.", time: "1 day ago", read: true }
      ]);
      const [showNotifMenu, setShowNotifMenu] = useState(false);

      // Database lists synced with localStorage
      const [users, setUsers] = useState(JSON.parse(localStorage.getItem("zest_users")));
      const [marketplace, setMarketplace] = useState(JSON.parse(localStorage.getItem("zest_marketplace")));
      const [accommodations, setAccommodations] = useState(JSON.parse(localStorage.getItem("zest_accommodations")));
      const [resources, setResources] = useState(JSON.parse(localStorage.getItem("zest_resources")));
      const [lostfound, setLostfound] = useState(JSON.parse(localStorage.getItem("zest_lostfound")));

      useEffect(() => {
        if (darkMode) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }, [darkMode]);

      // Check current session
      useEffect(() => {
        const loggedUser = localStorage.getItem("zest_current_user");
        if (loggedUser) {
          setCurrentUser(JSON.parse(loggedUser));
          setPage('dashboard');
        }
      }, []);

      const updateStoredUser = (updated) => {
        setCurrentUser(updated);
        localStorage.setItem("zest_current_user", JSON.stringify(updated));
        
        // Update in global users list
        const updatedUsersList = users.map(u => u.id === updated.id ? updated : u);
        setUsers(updatedUsersList);
        localStorage.setItem("zest_users", JSON.stringify(updatedUsersList));
      };

      const handleLogout = () => {
        localStorage.removeItem("zest_current_user");
        setCurrentUser(null);
        setPage('landing');
      };

                    className="rounded-lg p-2 text-slate-500 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800 transition-colors"

    // ========================================================
    // A. LANDING / AUTHENTICATION PAGE
    // ========================================================
    function LandingPage({ setUsers, users, setCurrentUser, setPage }) {
      const [isLogin, setIsLogin] = useState(true);
      const [formData, setFormData] = useState({ name: '', email: '', password: '', branch: '', year: '', status: 'Day Scholar', contact: '', profilePic: '' });
      const [error, setError] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        setError('');

        // Email domain verification
        const emailRegex = /^[a-zA-Z0-9._%+-]+@vit\.edu$/;
        if (!emailRegex.test(formData.email)) {
          setError('Restricted access! You must sign up with a valid @vit.edu email address.');
          return;
        }

        if (isLogin) {
          // Find user
          const user = users.find(u => u.email === formData.email && u.password === formData.password);
          if (!user) {
            setError('Invalid credentials or student record not registered.');
            return;
          }
          setCurrentUser(user);
          localStorage.setItem("zest_current_user", JSON.stringify(user));
          setPage('dashboard');
        } else {
          // Register
          if (!formData.name) {
            setError('Full Name is required.');
            return;
          }
          if (users.some(u => u.email === formData.email)) {
            setError('User with this email already exists.');
            return;
          }

          const newUser = {
            id: 'u' + (users.length + 1),
            name: formData.name,
            email: formData.email,
            password: formData.password,
            branch: formData.branch || 'General Engineering',
            year: formData.year || '1st Year',
            status: formData.status || 'Day Scholar',
            contact: formData.contact || '',
            profilePic: formData.profilePic || '',
            contributions: 0,
            wishlist: []
          };

          const updatedUsers = [...users, newUser];
          setUsers(updatedUsers);
          localStorage.setItem("zest_users", JSON.stringify(updatedUsers));
          
          setCurrentUser(newUser);
          localStorage.setItem("zest_current_user", JSON.stringify(newUser));
          setPage('dashboard');
        }
      };

      return (
        <div className="grid gap-12 lg:grid-cols-12 lg:items-center">

    // C. MARKETPLACE MODULE (OLX MOCKUP)
    // ========================================================
    function Marketplace({ marketplace, setMarketplace, currentUser }) {
      const [showAddForm, setShowAddForm] = useState(false);
      const [selectedItem, setSelectedItem] = useState(null);
      const [newItem, setNewItem] = useState({ title: '', description: '', category: 'Electronics', price: '', image: '' });
      const [filters, setFilters] = useState({ category: '', search: '' });

      const handleCreate = (e) => {
        e.preventDefault();
        if (!newItem.title || !newItem.price) return;

        const listing = {
          _id: 'm' + (marketplace.length + 1),
          seller: currentUser.id,
          sellerName: currentUser.name,
          sellerContact: currentUser.contact || currentUser.email,
          title: newItem.title,
          description: newItem.description,
          category: newItem.category,
          price: Number(newItem.price),
          image: newItem.image || 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=400&q=80',
          status: 'Interested',
          interestedBuyers: []
        };

        const updated = [listing, ...marketplace];
        setMarketplace(updated);
        localStorage.setItem("zest_marketplace", JSON.stringify(updated));
        setShowAddForm(false);
        setNewItem({ title: '', description: '', category: 'Electronics', price: '', image: '' });
      };

      const expressInterest = (itemId) => {
        const updated = marketplace.map(item => {
          if (item._id === itemId) {
            const buyers = item.interestedBuyers || [];
            if (!buyers.includes(currentUser.id)) {
              buyers.push(currentUser.id);
            }
            return {
              ...item,
              interestedBuyers: buyers,
              status: item.status === 'Interested' ? 'Contacted Seller' : item.status
            };
          }
          return item;
        });

        setMarketplace(updated);
        localStorage.setItem("zest_marketplace", JSON.stringify(updated));

        const target = updated.find(i => i._id === itemId);
        alert(`Interest Expressed! Seller contact details: ${target.sellerContact}`);
        setSelectedItem(target);
      };

      const updateDealStatus = (itemId, newStatus) => {
        const updated = marketplace.map(item => {
          if (item._id === itemId) {
            return { ...item, status: newStatus };
          }
          return item;
        });
        setMarketplace(updated);
        localStorage.setItem("zest_marketplace", JSON.stringify(updated));
        setSelectedItem(updated.find(i => i._id === itemId));
      };

      const deleteListing = (itemId) => {
        const updated = marketplace.filter(item => item._id !== itemId);
        setMarketplace(updated);
        localStorage.setItem("zest_marketplace", JSON.stringify(updated));
        setSelectedItem(null);
      };

      const filteredItems = marketplace.filter(item => {
        const matchesCategory = !filters.category || item.category === filters.category;
        const matchesSearch = !filters.search || item.title.toLowerCase().includes(filters.search.toLowerCase()) || item.description.toLowerCase().includes(filters.search.toLowerCase());
        return matchesCategory && matchesSearch;
      });

      return (
        <div className="space-y-6">
          <div className="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
            <div>
              <h2 className="text-2xl font-bold tracking-tight">Student Marketplace</h2>
              <p className="text-slate-500 text-sm">Browse second-hand cycles, textbooks, and campus essentials.</p>
            </div>
            <button 
              onClick={() => setShowAddForm(true)}
              className="inline-flex items-center gap-1.5 rounded-lg bg-emerald-500 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-600 transition-colors self-start shadow-md"
            >
              <Icon name="plus" className="h-4 w-4" /> Post Product
            </button>
          </div>

          {/* Search/Filter Bar */}
          <div className="flex flex-col gap-4 sm:flex-row">
            <div className="relative flex-1">
              <Icon name="search" className="absolute top-3 left-3 h-4 w-4 text-slate-400" />
              <input 
                type="text"
                placeholder="Search products..."
                value={filters.search}
                onChange={(e) => setFilters({ ...filters, search: e.target.value })}
                className="w-full rounded-lg border border-slate-200 bg-white py-2.5 pl-9 pr-4 text-sm dark:border-slate-800 dark:bg-slate-900 focus:border-emerald-500 outline-none"
              />
            </div>
            <select 
              value={filters.category}
              onChange={(e) => setFilters({ ...filters, category: e.target.value })}
              className="rounded-lg border border-slate-200 bg-white p-2.5 text-sm dark:border-slate-800 dark:bg-slate-900 outline-none"
            >
              <option value="">All Categories</option>
              <option value="Electronics">Electronics</option>
              <option value="Books">Books</option>
              <option value="Cycles">Cycles</option>
              <option value="Furniture">Furniture</option>
              <option value="Accessories">Accessories</option>
            </select>
          </div>

          {/* Listings Grid */}
          <div className="grid gap-6 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4">
            {filteredItems.map(item => (
              <div 
                key={item._id}
                onClick={() => setSelectedItem(item)}
                className="group flex flex-col cursor-pointer overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm hover:shadow-md transition-shadow dark:border-slate-800 dark:bg-slate-900"

                <div className="h-44 w-full bg-slate-100 overflow-hidden dark:bg-slate-800">
                  <img

                  />
                </div>
                <div className="p-4 flex-1 flex flex-col justify-between">
                  <div>
                    <span className="text-[10px] font-semibold uppercase tracking-wider text-emerald-500">{item.category}</span>
                    <h3 className="font-bold text-slate-850 dark:text-white mt-1 group-hover:text-emerald-500 transition-colors text-sm">{item.title}</h3>

    // ========================================================
    // E. PYQS & NOTES 플랫폼 (LEADERBOARD SUPPORT)
    // ========================================================
    function Resources({ resources, setResources, currentUser, updateStoredUser, users }) {
      const [showUpload, setShowUpload] = useState(false);
      const [newRes, setNewRes] = useState({ title: '', description: '', department: 'Computer', year: '1st Year', semester: 'Semester 1', subject: '', filePath: '' });
      const [filters, setFilters] = useState({ department: '', semester: '', subject: '', search: '' });
      const [selectedRes, setSelectedRes] = useState(null);
      const [ratingVal, setRatingVal] = useState(5);
      const [reviewText, setReviewText] = useState('');

      const handleCreate = (e) => {
        e.preventDefault();
        if (!newRes.title || !newRes.subject) return;

        const listing = {
          _id: 'r' + (resources.length + 1),
          contributor: currentUser.id,
          contributorName: currentUser.name,
          title: newRes.title,
          description: newRes.description,
          department: newRes.department,
          year: newRes.year,
          semester: newRes.semester,
          subject: newRes.subject,
          filePath: newRes.filePath || 'notes_syllabus_preview.pdf',
          downloads: 0,
          ratings: [],
          avgRating: 0.0,
          reviews: []
        };

        const updated = [listing, ...resources];
        setResources(updated);
        localStorage.setItem("zest_resources", JSON.stringify(updated));

        // Increment contributions count
        const currentCount = currentUser.contributions || 0;
        updateStoredUser({
          ...currentUser,
          contributions: currentCount + 1
        });

        setShowUpload(false);
        setNewRes({ title: '', description: '', department: 'Computer', year: '1st Year', semester: 'Semester 1', subject: '', filePath: '' });
      };

      const handleDownload = (id, filePath) => {
        const updated = resources.map(res => {
          if (res._id === id) {
            return { ...res, downloads: (res.downloads || 0) + 1 };
          }
          return res;
        });
        setResources(updated);
        localStorage.setItem("zest_resources", JSON.stringify(updated));
        
        // Mock download trigger
        alert(`Downloading syllabus resource: ${filePath}`);
        if (selectedRes?._id === id) {
          setSelectedRes(updated.find(r => r._id === id));
        }
      };

      const handleReview = (e) => {
        e.preventDefault();
        if (!reviewText) return;

        const updated = resources.map(res => {
          if (res._id === selectedRes._id) {
            const ratings = (res.ratings || []).filter(r => r.userId !== currentUser.id);
            ratings.push({ userId: currentUser.id, rating: Number(ratingVal) });
            const avg = ratings.reduce((sum, r) => sum + r.rating, 0) / ratings.length;

            const reviews = res.reviews || [];
            reviews.push({
              userId: currentUser.id,
              userName: currentUser.name,
              text: reviewText,
              date: new Date().toISOString()
            });

            return {
              ...res,
              ratings,
              avgRating: Number(avg.toFixed(1)),
              reviews
            };
          }
          return res;
        });

        setResources(updated);
        localStorage.setItem("zest_resources", JSON.stringify(updated));
        setSelectedRes(updated.find(r => r._id === selectedRes._id));
        setReviewText('');
      };

      const deleteResource = (id) => {
        const updated = resources.filter(r => r._id !== id);
        setResources(updated);
        localStorage.setItem("zest_resources", JSON.stringify(updated));
        setSelectedRes(null);
      };

      const filteredResources = resources.filter(res => {

    function LostFound({ lostfound, setLostfound, currentUser }) {
      const [showModal, setShowModal] = useState(false);
      const [selectedItem, setSelectedItem] = useState(null);
      const [newItem, setNewItem] = useState({ title: '', description: '', type: 'Lost', location: '', date: '', image: '' });
      const [filters, setFilters] = useState({ type: '', status: '', search: '' });
      const [claimMessage, setClaimMessage] = useState('');

      const handleCreate = (e) => {
        e.preventDefault();
        if (!newItem.title || !newItem.location) return;

        const report = {
          _id: 'lf' + (lostfound.length + 1),
          reporter: currentUser.id,
          reporterName: currentUser.name,
          reporterContact: currentUser.contact || currentUser.email,
          title: newItem.title,
          description: newItem.description,
          image: newItem.image || 'https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?auto=format&fit=crop&w=400&q=80',
          type: newItem.type,
          location: newItem.location,
          date: newItem.date || new Date().toISOString().split('T')[0],
          status: newItem.type === 'Lost' ? 'Lost' : 'Found',
          claimRequests: []
        };

        const updated = [report, ...lostfound];
        setLostfound(updated);
        localStorage.setItem("zest_lostfound", JSON.stringify(updated));
        setShowModal(false);
        setNewItem({ title: '', description: '', type: 'Lost', location: '', date: '', image: '' });
      };

      const submitClaim = (e) => {
        e.preventDefault();
        if (!claimMessage) return;

        const updated = lostfound.map(item => {
          if (item._id === selectedItem._id) {
            const claims = item.claimRequests || [];
            claims.push({
              userId: currentUser.id,
              userName: currentUser.name,
              contact: currentUser.contact || currentUser.email,
              message: claimMessage,
              isApproved: false
            });
            return {
              ...item,
              claimRequests: claims,
              status: item.status === 'Lost' || item.status === 'Found' ? 'Claimed' : item.status
            };
          }
          return item;
        });

        setLostfound(updated);
        localStorage.setItem("zest_lostfound", JSON.stringify(updated));
        setSelectedItem(updated.find(i => i._id === selectedItem._id));
        setClaimMessage('');
        alert("Claim verification request sent to the original reporter.");
      };

      const handleClaimApproval = (itemId, claimIdx, action) => {
        const updated = lostfound.map(item => {
          if (item._id === itemId) {
            const claims = [...item.claimRequests];
            let status = item.status;

            if (action === 'approve') {
              claims[claimIdx].isApproved = true;
              status = 'Verified';
            } else if (action === 'reject') {
              claims.splice(claimIdx, 1);
              status = claims.length > 0 ? 'Claimed' : (item.type === 'Lost' ? 'Lost' : 'Found');
            }

            return {
              ...item,
              claimRequests: claims,
              status
            };
          }
          return item;
        });

        setLostfound(updated);
        localStorage.setItem("zest_lostfound", JSON.stringify(updated));
        setSelectedItem(updated.find(i => i._id === itemId));
      };

      const updateStatus = (itemId, newStatus) => {
        const updated = lostfound.map(item => {
          if (item._id === itemId) {
            return { ...item, status: newStatus };
          }
          return item;
        });
        setLostfound(updated);
        localStorage.setItem("zest_lostfound", JSON.stringify(updated));
        setSelectedItem(updated.find(i => i._id === itemId));
      };

      const deleteReport = (id) => {
        const updated = lostfound.filter(item => item._id !== id);
        setLostfound(updated);
        localStorage.setItem("zest_lostfound", JSON.stringify(updated));
        setSelectedItem(null);
      };

      const filteredItems = lostfound.filter(item => {
        const matchesType = !filters.type || item.type === filters.type;
        const matchesStatus = !filters.status || item.status === filters.status;
        const matchesSearch = !filters.search || item.title.toLowerCase().includes(filters.search.toLowerCase()) || item.location.toLowerCase().includes(filters.search.toLowerCase());
        return matchesType && matchesStatus && matchesSearch;
      });

      return (
        <div className="space-y-6">
          <div className="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
            <div>
              <h2 className="text-2xl font-bold tracking-tight">Lost & Found Portal</h2>
              <p className="text-slate-500 text-sm">Report lost products, keys, wallets, or trace ownership claims.</p>
            </div>
            <button 
              onClick={() => setShowModal(true)}
              className="inline-flex items-center gap-1.5 rounded-lg bg-emerald-500 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-600 transition-colors shadow-md self-start"
            >
              <Icon name="plus" className="h-4 w-4" /> Report Lost/Found
            </button>
          </div>

          {/* Filters */}
          <div className="flex flex-wrap gap-4 items-center">
            <div className="relative flex-1 min-w-[200px]">
              <Icon name="search" className="absolute top-3 left-3 h-4 w-4 text-slate-400" />
              <input 
                type="text"
                placeholder="Search reported items or locations..."
                value={filters.search}
                onChange={(e) => setFilters({ ...filters, search: e.target.value })}
                className="w-full rounded-lg border border-slate-200 bg-white py-2 pl-9 pr-4 text-sm dark:border-slate-800 dark:bg-slate-900 focus:border-emerald-500 outline-none"
              />
            </div>
            <select 
              value={filters.type}
              onChange={(e) => setFilters({ ...filters, type: e.target.value })}
              className="rounded-lg border border-slate-200 bg-white p-2.5 text-sm dark:border-slate-800 dark:bg-slate-900 outline-none"
            >
              <option value="">All Types</option>
              <option value="Lost">Lost</option>
              <option value="Found">Found</option>
            </select>
            <select 
              value={filters.status}
              onChange={(e) => setFilters({ ...filters, status: e.target.value })}
              className="rounded-lg border border-slate-200 bg-white p-2.5 text-sm dark:border-slate-800 dark:bg-slate-900 outline-none"
            >
              <option value="">All Statuses</option>
              <option value="Lost">Lost</option>
              <option value="Found">Found</option>
              <option value="Claimed">Claimed</option>
              <option value="Verified">Verified</option>
              <option value="Returned">Returned</option>
            </select>
          </div>

          {/* List items Grid */}
          <div className="grid gap-6 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4">
            {filteredItems.map(item => (
              <div 
                key={item._id}

                <div className="h-44 bg-slate-100 overflow-hidden relative dark:bg-slate-850">
                  <img 
                    src={item.image}

                  </div>
                </div>
              </div>
            ))}

          {/* Add report Modal */}
          {showModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4">
              <div className="w-full max-w-md rounded-2xl border border-slate-200 bg-white p-6 shadow-2xl dark:border-slate-800 dark:bg-slate-900">

                  <button onClick={() => setShowModal(false)} className="text-slate-400 hover:text-slate-650"><Icon name="x" className="h-5 w-5" /></button>
                </div>
                <form onSubmit={handleCreate} className="space-y-4">
                  <div>
                    <label className="block text-xs font-semibold mb-1 text-slate-500 uppercase">Item Title</label>

                      type="text" required
                      placeholder="e.g. Noise Smartwatch Black"
                      value={newItem.title}
                      onChange={(e) => setNewItem({ ...newItem, title: e.target.value })}
                      className="w-full rounded-lg border border-slate-200 p-2.5 text-sm dark:border-slate-800 dark:bg-slate-950 focus:border-emerald-500 outline-none"
                    />
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs font-semibold mb-1 text-slate-500 uppercase">Type</label>
                      <select 
                        value={newItem.type}
                        onChange={(e) => setNewItem({ ...newItem, type: e.target.value })}
                        className="w-full rounded-lg border border-slate-200 p-2.5 text-sm dark:border-slate-800 dark:bg-slate-950 outline-none"
                      >
                        <option value="Lost">Lost</option>
                        <option value="Found">Found</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs font-semibold mb-1 text-slate-500 uppercase">Date of Incident</label>
                      <input 
                        type="date" required
                        value={newItem.date}
                        onChange={(e) => setNewItem({ ...newItem, date: e.target.value })}
                        className="w-full rounded-lg border border-slate-200 p-2.5 text-sm dark:border-slate-800 dark:bg-slate-950 focus:border-emerald-500 outline-none"
                      />
                    </div>
                  </div>
                  <div>
                    <label className="block text-xs font-semibold mb-1 text-slate-500 uppercase">Location</label>
                    <input 
                      type="text" required
                      placeholder="e.g. Library / Canteen block A"
                      value={newItem.location}
                      onChange={(e) => setNewItem({ ...newItem, location: e.target.value })}
                      className="w-full rounded-lg border border-slate-200 p-2.5 text-sm dark:border-slate-800 dark:bg-slate-950 focus:border-emerald-500 outline-none"
                    />
                  </div>
                  <div>
                    <label className="block text-xs font-semibold mb-1 text-slate-500 uppercase">Image URL (Optional)</label>
                    <input 
                      type="text"
                      placeholder="https://example.com/item.jpg"
                      value={newItem.image}
                      onChange={(e) => setNewItem({ ...newItem, image: e.target.value })}
                      className="w-full rounded-lg border border-slate-200 p-2.5 text-sm dark:border-slate-800 dark:bg-slate-950 focus:border-emerald-500 outline-none"
                    />
                  </div>
                  <div>
                    <label className="block text-xs font-semibold mb-1 text-slate-500 uppercase">Description</label>
                    <textarea 
                      rows="2"
                      placeholder="Describe unique identification characteristics..."
                      value={newItem.description}
                      onChange={(e) => setNewItem({ ...newItem, description: e.target.value })}
                      className="w-full rounded-lg border border-slate-200 p-2.5 text-sm dark:border-slate-800 dark:bg-slate-950 focus:border-emerald-500 outline-none"
                    />
                  </div>
                  <button 
                    type="submit" 
                    className="w-full rounded-lg bg-emerald-500 py-3 text-sm font-semibold text-white shadow-lg hover:bg-emerald-600 transition-colors"
                  >
                    Post Report
                  </button>
                </form>
              </div>
            </div>
          )}

          {/* Details Modal */}
          {selectedItem && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4">
              <div className="w-full max-w-lg rounded-2xl border border-slate-200 bg-white overflow-hidden shadow-2xl dark:border-slate-800 dark:bg-slate-900">
                <div className="h-56 bg-slate-100 relative dark:bg-slate-800">
                  <img 
                    src={selectedItem.image} 
                    alt={selectedItem.title} 
                    className="h-full w-full object-cover"
                  />
                  <button 
                    onClick={() => setSelectedItem(null)} 
                    className="absolute top-4 right-4 bg-black/40 text-white rounded-full p-1.5 hover:bg-black/60 transition-colors"
                  >
                    <Icon name="x" className="h-5 w-5" />
                  </button>
                </div>
                
                <div className="p-6 space-y-4 max-h-[60vh] overflow-y-auto">
                  <div className="flex justify-between items-start">
                    <div>
                      <span className="text-xs font-semibold text-emerald-500 uppercase">{selectedItem.type} Item</span>
                      <h3 className="text-xl font-bold mt-1">{selectedItem.title}</h3>
                    </div>
                    {selectedItem.reporter === currentUser.id && (
                      <button 
                        onClick={() => deleteReport(selectedItem._id)}
                        className="text-red-500 hover:text-red-650 p-1.5 rounded-lg border border-red-200 hover:bg-red-50 dark:border-red-950 dark:hover:bg-red-950/20"
                      >
                        <Icon name="trash" className="h-4.5 w-4.5" />
                      </button>
                    )}
                  </div>
                  <p className="text-xs text-slate-400 flex items-center gap-1"><Icon name="map-pin" className="h-4 w-4" /> {selectedItem.location} • Incident Date: {selectedItem.date}</p>

                  <div>
                    <h4 className="text-xs uppercase font-semibold text-slate-400">Description</h4>
                    <p className="text-sm text-slate-600 dark:text-slate-350 mt-1 leading-relaxed">{selectedItem.description || 'No description provided.'}</p>
                  </div>

                  {selectedItem.reporter === currentUser.id ? (
                    <div className="space-y-3 border-t border-slate-100 pt-4 dark:border-slate-800">
                      <h4 className="text-xs uppercase font-semibold text-slate-400">Claims Submitted ({selectedItem.claimRequests?.length || 0})</h4>
                      <div className="space-y-3">
                        {selectedItem.claimRequests?.map((claim, idx) => (
                          <div key={idx} className="border border-slate-200 rounded-xl p-3 text-xs dark:border-slate-800 space-y-2 bg-slate-50 dark:bg-slate-900/50">
                            <div className="flex justify-between items-center">
                              <span className="font-semibold">{claim.userName} ({claim.contact})</span>
                              {claim.isApproved ? (
                                <span className="font-bold text-emerald-500">Approved & Verified</span>
                              ) : (
                                <div className="flex gap-2">
                                  <button onClick={() => handleClaimApproval(selectedItem._id, idx, 'approve')} className="text-emerald-500 hover:underline">Approve</button>
                                  <button onClick={() => handleClaimApproval(selectedItem._id, idx, 'reject')} className="text-red-500 hover:underline">Reject</button>
                                </div>
                              )}
                            </div>
                            <p className="text-slate-500"><b>Details:</b> {claim.message}</p>
                          </div>
                        ))}
                      </div>

                      {selectedItem.status !== 'Returned' && (
                        <button 
                          onClick={() => updateStatus(selectedItem._id, 'Returned')}
                          className="w-full rounded-lg bg-emerald-500 py-2.5 text-xs text-white hover:bg-emerald-600 transition-colors font-semibold"
                        >
                          Mark as Returned to Owner
                        </button>
                      )}
                    </div>
                  ) : (
                    <div className="border-t border-slate-100 pt-4 dark:border-slate-800">
                      <form onSubmit={submitClaim} className="space-y-3">
                        <span className="block text-xs uppercase font-bold text-slate-500">Claim ownership of this item</span>
                        <p className="text-[10px] text-slate-400">Describe unique identification marks (color straps, content details) so the reporter can verify you.</p>
                        <input 
                          type="text" required
                          placeholder="e.g. My wallet has my driving license and two metro cards..."
                          value={claimMessage}
                          onChange={(e) => setClaimMessage(e.target.value)}
                          className="w-full rounded-lg border border-slate-200 p-2.5 text-xs dark:border-slate-800 dark:bg-slate-950 focus:border-emerald-500 outline-none"
                        />
                        <button type="submit" className="w-full rounded bg-emerald-500 py-2.5 text-xs text-white font-semibold shadow hover:bg-emerald-600 transition-colors">Submit Claim Verification Request</button>
                      </form>
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ========================================================
    // G. STUDENT PROFILE COMPONENT
    // ========================================================
    function Profile({ currentUser, updateStoredUser }) {
      const [formData, setFormData] = useState({ name: '', branch: '', year: '', status: 'Day Scholar', contact: '', profilePic: '' });
      const [editSuccess, setEditSuccess] = useState(false);

      useEffect(() => {
        if (currentUser) {
          setFormData({
            name: currentUser.name || '',
            branch: currentUser.branch || '',
            year: currentUser.year || '',
            status: currentUser.status || 'Day Scholar',
            contact: currentUser.contact || '',
            profilePic: currentUser.profilePic || ''
          });
        }
      }, [currentUser]);

      const handleUpdate = (e) => {
        e.preventDefault();
        
        updateStoredUser({
          ...currentUser,
          name: formData.name,
          branch: formData.branch,
          year: formData.year,
          status: formData.status,
          contact: formData.contact,
          profilePic: formData.profilePic
        });

        setEditSuccess(true);
        setTimeout(() => setEditSuccess(false), 3000);
      };

      return (
        <div className="w-full max-w-xl mx-auto rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-slate-900 space-y-6">
          <div className="flex items-center gap-4 border-b border-slate-100 pb-4 dark:border-slate-800">
            <div className="h-16 w-16 overflow-hidden rounded-full border border-emerald-500 shrink-0">
              <img src={formData.profilePic || "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=80&q=80"} alt="Profile" className="h-full w-full object-cover" />
            </div>
            <div>
              <h3 className="font-bold text-lg">{currentUser?.name}</h3>
              <p className="text-xs text-slate-400">{currentUser?.email} • {currentUser?.branch}</p>
            </div>
          </div>

          <form onSubmit={handleUpdate} className="space-y-4">
            {editSuccess && (
              <div className="rounded-lg bg-emerald-50 p-3 text-xs text-emerald-600 dark:bg-emerald-950/20 dark:text-emerald-400 border border-emerald-200 dark:border-emerald-900">
                Student Profile saved successfully.
              </div>
            )}

            <div>
              <label className="block text-xs font-semibold mb-1 text-slate-500 uppercase">Profile Picture URL</label>
              <input 
                type="text"
                placeholder="https://example.com/student-avatar.jpg"
                value={formData.profilePic}
                onChange={(e) => setFormData({ ...formData, profilePic: e.target.value })}
                className="w-full rounded-lg border border-slate-200 p-2.5 text-sm dark:border-slate-800 dark:bg-slate-950 focus:border-emerald-500 outline-none"
              />
            </div>

            <div className="grid grid-cols-2 gap-4">
              <div>
                <label className="block text-xs font-semibold mb-1 text-slate-500 uppercase">Full Name</label>
                <input 
                  type="text" required
                  value={formData.name}
                  onChange={(e) => setFormData({ ...formData, name: e.target.value })}
                  className="w-full rounded-lg border border-slate-200 p-2.5 text-sm dark:border-slate-800 dark:bg-slate-950 focus:border-emerald-500 outline-none"
                />
              </div>
              <div>
                <label className="block text-xs font-semibold mb-1 text-slate-500 uppercase">Phone Number</label>
                <input 
                  type="text"
                  placeholder="+91 XXXXX XXXXX"
                  value={formData.contact}
                  onChange={(e) => setFormData({ ...formData, contact: e.target.value })}
                  className="w-full rounded-lg border border-slate-200 p-2.5 text-sm dark:border-slate-800 dark:bg-slate-950 focus:border-emerald-500 outline-none"
                />
              </div>
            </div>

            <div className="grid grid-cols-3 gap-4">
              <div>
                <label className="block text-xs font-semibold mb-1 text-slate-500 uppercase">Branch</label>
                <input 
                  type="text"
                  value={formData.branch}
                  onChange={(e) => setFormData({ ...formData, branch: e.target.value })}
                  className="w-full rounded-lg border border-slate-200 p-2.5 text-sm dark:border-slate-800 dark:bg-slate-950 focus:border-emerald-500 outline-none"
                />
              </div>
              <div>
                <label className="block text-xs font-semibold mb-1 text-slate-500 uppercase">Year</label>
                <select 
                  value={formData.year}
                  onChange={(e) => setFormData({ ...formData, year: e.target.value })}
                  className="w-full rounded-lg border border-slate-200 p-2.5 text-sm dark:border-slate-800 dark:bg-slate-950 outline-none"
                >
                  <option value="1st Year">1st Year</option>
                  <option value="2nd Year">2nd Year</option>
                  <option value="3rd Year">3rd Year</option>
                  <option value="4th Year">4th Year</option>
                </select>
              </div>
              <div>
                <label className="block text-xs font-semibold mb-1 text-slate-500 uppercase">Status</label>
                <select 
                  value={formData.status}
                  onChange={(e) => setFormData({ ...formData, status: e.target.value })}
                  className="w-full rounded-lg border border-slate-200 p-2.5 text-sm dark:border-slate-800 dark:bg-slate-950 outline-none"
                >
                  <option value="Hostel">Hostel Scholar</option>
                  <option value="Day Scholar">Day Scholar</option>
                </select>
              </div>
            </div>

            <button 
              type="submit" 
              className="w-full rounded-lg bg-emerald-500 py-3 text-sm font-semibold text-white shadow-lg hover:bg-emerald-600 transition-colors"
            >
              Update Student Profile
            </button>
          </form>
        </div>
      );
    }

    // Render into root
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
